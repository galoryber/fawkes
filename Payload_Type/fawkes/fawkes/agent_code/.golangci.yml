version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gocritic
    - bodyclose
    - copyloopvar
  settings:
    errcheck:
      exclude-functions:
        - os.WriteFile
        - os.MkdirAll
        - os.Mkdir
        - os.Chdir
        - os.Remove
        - os.RemoveAll
        - os.Chmod
        - os.Chtimes
        - os.Setenv
        - os.Unsetenv
        - filepath.Walk
        - path/filepath.Walk
        - (net.Conn).Close
        - (net.Conn).SetReadDeadline
        - (net.Conn).SetWriteDeadline
        - (*net.TCPListener).SetDeadline
        - (*os.File).Close
        - (*os.File).Seek
        - (*os.File).Sync
        - (io.Closer).Close
        - (io.ReadCloser).Close
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
        - (*archive/zip.Writer).Close
    staticcheck:
      checks:
        - all
        - -SA9003
        - -ST1000  # Package comment not required
        - -ST1003  # Naming convention (pre-existing, would break API)
        - -ST1011  # Variable naming with unit suffix
        - -QF1001  # De Morgan's law suggestion
        - -QF1002  # Tagged switch suggestion
        - -QF1011  # Type inference suggestion
        - -QF1012  # fmt.Fprintf suggestion
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - bodyclose
      # SA5011: staticcheck doesn't model t.Fatal as a terminator, so nil-deref
      # warnings after t.Fatal are false positives in test code.
      - path: _test\.go
        text: "SA5011"
        linters:
          - staticcheck
      # Ignore unchecked Close() on various types in defer statements
      - text: "Error return value of `.+\\.Close`"
        linters:
          - errcheck
      # Pre-existing: IPv6 address format warnings
      - text: "hostport.*IPv6"
        linters:
          - govet
      # appendAssign: intentional slice construction patterns (iv+cipher, uuid+data)
      - text: "appendAssign"
        linters:
          - gocritic
      # ifElseChain: sequential condition checks are clearer than switch in many contexts
      - text: "ifElseChain"
        linters:
          - gocritic
